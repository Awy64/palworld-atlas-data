name: Refresh Atlas data
# Scheduled publication runs only after all server-table validations succeed.

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Rebuild even when the Steam build ID is unchanged
        required: false
        default: false
        type: boolean
      mappings_url:
        description: Optional build-compatible Mappings.usmap URL override
        required: false
        type: string
      allow_count_drop:
        description: One-time manual override for an intentional normalization cleanup
        required: false
        default: false
        type: boolean

concurrency:
  group: atlas-data-refresh
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Test extractor
        run: dotnet test PalworldAtlas.slnx --configuration Release
      - name: Install SteamCMD
        run: scripts/install-steamcmd.sh "$RUNNER_TEMP/steamcmd"
      - name: Check Steam build
        id: build
        env:
          FORCE: ${{ inputs.force || false }}
        run: |
          build_id="$(scripts/query-build-id.sh "$RUNNER_TEMP/steamcmd/steamcmd.sh")"
          test -n "$build_id"
          published_id="$(jq -r '.steamBuildId // empty' published/v1/latest.json 2>/dev/null || true)"
          changed=true
          if [ "$FORCE" != "true" ] && [ "$build_id" = "$published_id" ]; then changed=false; fi
          echo "id=$build_id" >> "$GITHUB_OUTPUT"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
      - name: Resolve mappings
        if: steps.build.outputs.changed == 'true'
        id: mappings
        env:
          INPUT_URL: ${{ inputs.mappings_url }}
          REPOSITORY_URL: ${{ vars.PALWORLD_MAPPINGS_URL }}
        run: |
          url="${INPUT_URL:-$REPOSITORY_URL}"
          if [ -n "$url" ]; then
            curl --fail --location --silent --show-error "$url" -o "$RUNNER_TEMP/Mappings.usmap"
            echo "provided=true" >> "$GITHUB_OUTPUT"
          else
            echo "The current server build exposes the required table properties without an external mappings file."
            echo "provided=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Download Linux dedicated server
        if: steps.build.outputs.changed == 'true'
        run: scripts/download-server.sh "$RUNNER_TEMP/steamcmd/steamcmd.sh" "$RUNNER_TEMP/palworld-server"
      - name: Extract and validate
        if: steps.build.outputs.changed == 'true'
        env:
          ALLOW_COUNT_DROP: ${{ inputs.allow_count_drop || false }}
        run: |
          mkdir -p artifacts/site
          cp -R published/. artifacts/site/
          latest_path="$(jq -r '.buildPath // empty' published/v1/latest.json 2>/dev/null || true)"
          previous_args=()
          if [ "$ALLOW_COUNT_DROP" != "true" ] && [ -n "$latest_path" ] && [ -f "published/v1/$latest_path/manifest.json" ]; then
            previous_args=(--previous-manifest "published/v1/$latest_path/manifest.json")
          fi
          mappings_args=()
          if [ -f "$RUNNER_TEMP/Mappings.usmap" ]; then
            mappings_args=(--mappings "$RUNNER_TEMP/Mappings.usmap")
          fi
          set +e
          output="$(dotnet run --project src/PalworldAtlas.Extractor --configuration Release --no-build -- \
            publish \
            --pak-dir "$RUNNER_TEMP/palworld-server/Pal/Content/Paks" \
            --output artifacts/site \
            --build-id "${{ steps.build.outputs.id }}" \
            "${mappings_args[@]}" \
            "${previous_args[@]}" 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -ne 0 ]; then
            printf '%s\n' "$output" > artifacts/extraction-error.txt
            exit "$status"
          fi
      - name: Commit validated data
        if: steps.build.outputs.changed == 'true'
        run: |
          rsync -a --delete artifacts/site/ published/
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add published
          git commit -m "data: publish Palworld build ${{ steps.build.outputs.id }}"
          git push
      - uses: actions/configure-pages@v5
        if: steps.build.outputs.changed == 'true'
      - uses: actions/upload-pages-artifact@v3
        if: steps.build.outputs.changed == 'true'
        with:
          path: published
      - name: Deploy GitHub Pages
        if: steps.build.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Close resolved extraction issue
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          issue="$(gh issue list --state open --search 'Automated extraction failed in:title' --json number --jq '.[0].number // empty')"
          if [ -n "$issue" ]; then gh issue close "$issue" --comment "Build ${{ steps.build.outputs.id }} passed validation and was published."; fi
      - name: Report extraction failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_ID: ${{ steps.build.outputs.id }}
        run: |
          title="Automated extraction failed"
          detail="$(tail -n 1 artifacts/extraction-error.txt 2>/dev/null || echo 'A prerequisite or Steam query step failed before extraction completed.')"
          body="Palworld build ${BUILD_ID:-unknown} did not pass the extraction or contract gate. The previous published build remains active. Failure: \`${detail}\`. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          issue="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$issue" ]; then gh issue comment "$issue" --body "$body"; else gh issue create --title "$title" --body "$body"; fi
